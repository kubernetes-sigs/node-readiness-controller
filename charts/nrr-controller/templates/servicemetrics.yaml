apiVersion: v1
kind: Service
metadata:
  name: {{ include "nrr-controller.fullname" . }}-metrics-service
  namespace: {{ include "nrr-controller.namespace" . }}
  labels:
    {{- include "nrr-controller.labels" . | nindent 4 }}
spec:
  ports:
    - name: https
      port: {{ .Values.metrics.service.port }}
      protocol: TCP
      targetPort: {{ .Values.metrics.service.targetPort }}
  selector:
    {{- include "nrr-controller.selectorLabels" . | nindent 4 }}
