apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: nodereadinessrules.readiness.node.x-k8s.io
spec:
  group: readiness.node.x-k8s.io
  names:
    kind: NodeReadinessRule
    listKind: NodeReadinessRuleList
    plural: nodereadinessrules
    shortNames:
      - nrr
    singular: nodereadinessrule
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - description: Continuous, Bootstrap or Dryrun - shows if the rule is in enforcement or dryrun mode.
          jsonPath: .spec.enforcementMode
          name: Mode
          type: string
        - description: The readiness taint applied by this rule.
          jsonPath: .spec.taint.key
          name: Taint
          type: string
        - description: The age of this resource
          jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
      schema:
        openAPIV3Schema:
          description: NodeReadinessRule is the Schema for the NodeReadinessRules API.
          type: object
          required:
            - spec
          properties:
            apiVersion:
              description: |-
                APIVersion defines the versioned schema of this representation of an object.
                Servers should convert recognized schemas to the latest internal value, and
                may reject unrecognized values.
              type: string
            kind:
              description: |-
                Kind is a string value representing the REST resource this object represents.
                Servers may infer this from the endpoint the client submits requests to.
                Cannot be updated.
              type: string
            metadata:
              type: object
            spec:
              description: spec defines the desired state of NodeReadinessRule
              type: object
              required:
                - conditions
                - enforcementMode
                - nodeSelector
                - taint
              properties:
                conditions:
                  description: |-
                    conditions contains a list of the Node conditions that defines the specific
                    criteria that must be met for taints to be managed on the target Node.
                    The presence or status of these conditions directly triggers the application or removal of Node taints.
                  type: array
                  minItems: 1
                  maxItems: 32
                  x-kubernetes-list-map-keys:
                    - type
                  x-kubernetes-list-type: map
                  items:
                    type: object
                    description: |-
                      ConditionRequirement defines a specific Node condition and the status value
                      required to trigger the controller's action.
                    required:
                      - requiredStatus
                      - type
                    properties:
                      requiredStatus:
                        description: requiredStatus is status of the condition, one of True, False, Unknown.
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      type:
                        description: |-
                          type of Node condition

                          Following kubebuilder validation is referred from https://pkg.go.dev/k8s.io/apimachinery/pkg/apis/meta/v1#Condition
                        type: string
                        minLength: 1
                        maxLength: 316
                dryRun:
                  description: |-
                    dryRun when set to true, The controller will evaluate Node conditions and log intended taint modifications
                    without persisting changes to the cluster. Proposed actions are reflected in the resource status.
                  type: boolean
                enforcementMode:
                  description: |-
                    enforcementMode specifies how the controller maintains the desired state.
                    enforcementMode is one of bootstrap-only, continuous.
                    "bootstrap-only" applies the configuration once during initial setup.
                    "continuous" ensures the state is monitored and corrected throughout the resource lifecycle.
                  type: string
                  enum:
                    - bootstrap-only
                    - continuous
                nodeSelector:
                  description: nodeSelector limits the scope of this rule to a specific subset of Nodes.
                  type: object
                  x-kubernetes-map-type: atomic
                  properties:
                    matchExpressions:
                      description: matchExpressions is a list of label selector requirements. The requirements are ANDed.
                      type: array
                      x-kubernetes-list-type: atomic
                      items:
                        type: object
                        required:
                          - key
                          - operator
                        properties:
                          key:
                            description: key is the label key that the selector applies to.
                            type: string
                          operator:
                            description: |-
                              operator represents a key's relationship to a set of values.
                              Valid operators are In, NotIn, Exists and DoesNotExist.
                            type: string
                          values:
                            description: |-
                              values is an array of string values. If the operator is In or NotIn,
                              the values array must be non-empty. If the operator is Exists or DoesNotExist,
                              the values array must be empty.
                            type: array
                            x-kubernetes-list-type: atomic
                            items:
                              type: string
                    matchLabels:
                      description: |-
                        matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                        map is equivalent to an element of matchExpressions.
                      type: object
                      additionalProperties:
                        type: string
                taint:
                  description: |-
                    taint defines the specific Taint (Key, Value, and Effect) to be managed
                    on Nodes that meet the defined condition criteria.
                  type: object
                  required:
                    - effect
                    - key
                  properties:
                    effect:
                      description: |-
                        Required. The effect of the taint on pods
                        that do not tolerate the taint.
                        Valid effects are NoSchedule, PreferNoSchedule and NoExecute.
                      type: string
                    key:
                      description: Required. The taint key to be applied to a node.
                      type: string
                    timeAdded:
                      description: TimeAdded represents the time at which the taint was added.
                      type: string
                      format: date-time
                    value:
                      description: The taint value corresponding to the taint key.
                      type: string
            status:
              description: status defines the observed state of NodeReadinessRule
              type: object
              minProperties: 1
              properties:
                appliedNodes:
                  description: |-
                    appliedNodes lists the names of Nodes where the taint has been successfully managed.
                  type: array
                  maxItems: 5000
                  x-kubernetes-list-type: set
                  items:
                    type: string
                    maxLength: 253
                dryRunResults:
                  description: |-
                    dryRunResults captures the outcome of the rule evaluation when DryRun is enabled.
                  type: object
                  minProperties: 1
                  required:
                    - summary
                  properties:
                    affectedNodes:
                      description: affectedNodes is the total count of Nodes that match the rule's criteria.
                      type: integer
                      format: int32
                      minimum: 0
                    riskyOperations:
                      description: |-
                        riskyOperations represents the count of Nodes where required conditions
                        are missing entirely, potentially indicating an ambiguous node state.
                      type: integer
                      format: int32
                      minimum: 0
                    summary:
                      description: |-
                        summary provides a human-readable overview of the dry run evaluation,
                        highlighting key findings or warnings.
                      type: string
                      minLength: 1
                      maxLength: 4096
                    taintsToAdd:
                      description: taintsToAdd is the number of Nodes that currently lack the specified taint and would have it applied.
                      type: integer
                      format: int32
                      minimum: 0
                    taintsToRemove:
                      description: |-
                        taintsToRemove is the number of Nodes that currently possess the taint but no longer meet the criteria.
                      type: integer
                      format: int32
                      minimum: 0
                failedNodes:
                  description: |-
                    failedNodes lists the Nodes where the rule evaluation encountered an error.
                  type: array
                  maxItems: 5000
                  x-kubernetes-list-map-keys:
                    - nodeName
                  x-kubernetes-list-type: map
                  items:
                    type: object
                    required:
                      - lastEvaluationTime
                      - nodeName
                    properties:
                      lastEvaluationTime:
                        description: lastEvaluationTime is the timestamp of the last rule check failed for this Node.
                        type: string
                        format: date-time
                      message:
                        description: message is a human-readable message indicating details about the evaluation.
                        type: string
                        minLength: 1
                        maxLength: 10240
                      nodeName:
                        description: |-
                          nodeName is the name of the failed Node.
                        type: string
                        minLength: 1
                        maxLength: 253
                        pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                      reason:
                        description: reason provides a brief explanation of the evaluation result.
                        type: string
                        minLength: 1
                        maxLength: 256
                nodeEvaluations:
                  description: |-
                    nodeEvaluations provides detailed insight into the rule's assessment for individual Nodes.
                  type: array
                  maxItems: 5000
                  x-kubernetes-list-map-keys:
                    - nodeName
                  x-kubernetes-list-type: map
                  items:
                    type: object
                    required:
                      - conditionResults
                      - lastEvaluationTime
                      - nodeName
                      - taintStatus
                    properties:
                      conditionResults:
                        description: |-
                          conditionResults provides a detailed breakdown of each condition evaluation for this Node.
                        type: array
                        maxItems: 5000
                        x-kubernetes-list-map-keys:
                          - type
                        x-kubernetes-list-type: map
                        items:
                          type: object
                          required:
                            - currentStatus
                            - requiredStatus
                            - type
                          properties:
                            currentStatus:
                              type: string
                              enum:
                                - "True"
                                - "False"
                                - Unknown
                            requiredStatus:
                              type: string
                              enum:
                                - "True"
                                - "False"
                                - Unknown
                            type:
                              type: string
                              minLength: 1
                              maxLength: 316
                      lastEvaluationTime:
                        description: lastEvaluationTime is the timestamp when the controller last assessed this Node.
                        type: string
                        format: date-time
                      nodeName:
                        description: nodeName is the name of the evaluated Node.
                        type: string
                        minLength: 1
                        maxLength: 253
                        pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                      taintStatus:
                        description: taintStatus represents the taint status on the Node, one of Present, Absent.
                        type: string
                        enum:
                          - Present
                          - Absent
                observedGeneration:
                  description: observedGeneration reflects the generation of the most recently observed NodeReadinessRule by the controller.
                  type: integer
                  format: int64
                  minimum: 1
      subresources:
        status: {}
