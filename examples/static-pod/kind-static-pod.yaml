kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: nrr-static
nodes:
- role: control-plane
  extraMounts:
  - hostPath: ./examples/static-pod/node-readiness-controller.yaml
    containerPath: /etc/kubernetes/manifests/node-readiness-controller.yaml
    readOnly: true
- role: control-plane
  extraMounts:
  - hostPath: ./examples/static-pod/node-readiness-controller.yaml
    containerPath: /etc/kubernetes/manifests/node-readiness-controller.yaml
    readOnly: true
- role: control-plane
  extraMounts:
  - hostPath: ./examples/static-pod/node-readiness-controller.yaml
    containerPath: /etc/kubernetes/manifests/node-readiness-controller.yaml
    readOnly: true
- role: worker
  kubeadmConfigPatches:
  - |
    kind: JoinConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "reserved-for=worker"
        register-with-taints: "readiness.k8s.io/NetworkReady=pending:NoSchedule"
- role: worker
  kubeadmConfigPatches:
  - |
    kind: JoinConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "reserved-for=worker"
        register-with-taints: "readiness.k8s.io/NetworkReady=pending:NoSchedule"
