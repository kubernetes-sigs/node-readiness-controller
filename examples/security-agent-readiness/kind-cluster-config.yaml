kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: security-agent-demo
nodes:
- role: control-plane
- role: worker
  kubeadmConfigPatches:
  - |
    kind: JoinConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        register-with-taints: "readiness.k8s.io/security-agent-ready=pending:NoSchedule"
