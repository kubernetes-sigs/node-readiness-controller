kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: npd-descheduler-demo
nodes:
- role: control-plane
- role: worker
  kubeadmConfigPatches:
  - |
    kind: JoinConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        register-with-taints: "readiness.k8s.io/my-component-ready=false:NoSchedule"
- role: worker
  kubeadmConfigPatches:
  - |
    kind: JoinConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        register-with-taints: "readiness.k8s.io/my-component-ready=false:NoSchedule"
