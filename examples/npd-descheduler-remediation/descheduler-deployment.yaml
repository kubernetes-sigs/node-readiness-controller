apiVersion: apps/v1
kind: Deployment
metadata:
  name: descheduler
  namespace: kube-system
  labels:
    app: descheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: descheduler
  template:
    metadata:
      labels:
        app: descheduler
    spec:
      serviceAccountName: descheduler
      tolerations:
      - key: "readiness.k8s.io/my-component-ready"
        operator: "Exists"
        effect: "NoSchedule"
      containers:
      - name: descheduler
        image: registry.k8s.io/descheduler/descheduler:v0.31.0
        command:
        - /bin/descheduler
        args:
        - --policy-config-file=/policy/policy.yaml
        - --descheduling-interval=30s
        - --v=3
        volumeMounts:
        - name: policy
          mountPath: /policy
          readOnly: true
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
      volumes:
      - name: policy
        configMap:
          name: descheduler-policy
